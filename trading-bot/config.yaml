# Режим работы: paper | testnet | live
mode: paper

exchange: binance
symbols:
  - BTC/USDT
  - ETH/USDT
timeframe: 1h
candles_history: 300      # свечей для разогрева индикаторов
poll_interval_sec: 30     # как часто проверять новую свечу / стопы

strategy:
  ema_fast: 12
  ema_slow: 26
  rsi_period: 14
  rsi_overbought: 70
  atr_period: 14

risk:
  risk_per_trade_pct: 1.0       # % капитала под риском в одной сделке
  stop_atr_mult: 2.0            # стоп-лосс = entry - N * ATR
  take_profit_atr_mult: 3.0     # тейк-профит = entry + N * ATR
  max_open_positions: 2
  max_daily_loss_pct: 5.0       # дневной kill switch
  min_order_usdt: 11            # минимальный ордер Binance ~10 USDT + запас
  budget_usdt: 0                # лимит USDT для этого бота на общем счёте (0 = без лимита);
                                # ставьте, если параллельно работает smartmoney-бот

paper:
  starting_balance_usdt: 500
  fee_pct: 0.1                  # комиссия тейкера Binance

paths:
  db: data/bot.db
  stop_file: data/STOP         # общий kill switch: touch data/STOP останавливает
                               # новые входы у ВСЕХ ботов (data/ — общий том)

telegram:
  enabled: false               # true + токен/чат в .env для уведомлений

# Связка анализаторов: трендовый бот входит, только если smart-money бот
# видит поддержку умных кошельков. Требует запущенного smartmoney-бота;
# если его данные недоступны/устарели — фильтр мягко отключается (fail-open).
smartmoney_filter:
  enabled: false               # true = покупать только при поддержке умных денег
  min_longs: 2                 # минимум умных кошельков в лонге по монете
  max_age_min: 10              # свежесть консенсуса; старше — игнорируем фильтр
  consensus_file: data/consensus.json

# Smart-money трекер (python -m smartmoney.main) — см. docs/ALT_STRATEGIES.md
smartmoney:
  api_url: https://api.hyperliquid.xyz/info
  leaderboard_url: https://stats-data.hyperliquid.xyz/Mainnet/leaderboard
  leaderboard_candidates: 50   # сколько адресов брать из лидерборда на скоринг
  wallets: []                  # или свои адреса 0x... (тогда лидерборд не нужен)
  min_trades: 30               # минимум закрытых сделок для доверия к кошельку
  top_n: 10                    # сколько лучших кошельков отслеживать
  consensus_min: 3             # сколько должны сойтись в лонге для сигнала
  coins: [BTC, ETH, SOL]
  map_to_spot:                 # исполнение сигнала на споте Binance (auto_trade)
    BTC: BTC/USDT
    ETH: ETH/USDT
    SOL: SOL/USDT
  poll_interval_sec: 60
  consensus_file: data/consensus.json  # сюда публикуется анализ для трендового бота
  auto_trade: false            # false = только уведомления (режим наблюдения)
  budget_usdt: 0               # лимит USDT этого бота на общем счёте (0 = без лимита)
  db: data/smartmoney.db       # отдельное состояние, не пересекается с v1
