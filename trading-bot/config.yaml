# Режим работы: paper | testnet | live
mode: paper

exchange: binance
symbols:
  - BTC/USDT
  - ETH/USDT
timeframe: 1h
candles_history: 300      # свечей для разогрева индикаторов
poll_interval_sec: 30     # как часто проверять новую свечу / стопы

strategy:
  ema_fast: 12
  ema_slow: 26
  rsi_period: 14
  rsi_overbought: 70
  atr_period: 14

risk:
  risk_per_trade_pct: 1.0       # % капитала под риском в одной сделке
  stop_atr_mult: 2.0            # стоп-лосс = entry - N * ATR
  take_profit_atr_mult: 3.0     # тейк-профит = entry + N * ATR
  max_open_positions: 2
  max_daily_loss_pct: 5.0       # дневной kill switch
  min_order_usdt: 11            # минимальный ордер Binance ~10 USDT + запас

paper:
  starting_balance_usdt: 500
  fee_pct: 0.1                  # комиссия тейкера Binance

paths:
  db: data/bot.db
  stop_file: STOP              # создайте этот файл, чтобы остановить новые входы

telegram:
  enabled: false               # true + токен/чат в .env для уведомлений
