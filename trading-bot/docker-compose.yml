# Совместный автономный запуск обоих ботов:  docker compose up -d --build
# Оба перезапускаются сами (unless-stopped), состояние — на общем томе ./data,
# kill switch общий:  touch data/STOP  останавливает новые входы у обоих.
services:
  trend-bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro

  smartmoney-bot:
    build: .
    command: python -m smartmoney.main
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro

  funding-monitor:
    build: .
    command: python -m monitor.funding
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro

  # автоперенастройка: раз в interval_days подбирает параметры на свежих
  # данных и применяет, только если они лучше текущих на out-of-sample
  retune:
    build: .
    command: python -m backtest.retune --apply --loop
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
